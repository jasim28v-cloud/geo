<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | PREMIUM ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #ff007f; --bg: #0a0a0a; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        .viewport { max-width: 1000px; margin: 80px auto; padding: 10px; display: flex; flex-direction: column; gap: 40px; }

        .card { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--neon); }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* واجهة التفاصيل (Popup) */
        #video-details-ui { position: fixed; inset: 0; background: #050505; z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .details-content { max-width: 900px; margin: 0 auto; width: 100%; padding: 20px; }
        
        /* شريط التعليقات */
        .comment-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .comment-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; line-height: 1.5; }

        .action-bar { display: flex; gap: 15px; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; justify-content: space-around; }
        .btn-action { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; transition: 0.3s; color: rgba(255,255,255,0.6); }
        .btn-action i { font-size: 20px; color: var(--neon); }
        .btn-action:active { transform: scale(0.9); }

        header { position: fixed; top: 0; width: 100%; padding: 15px 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        nav { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .nav-btn { width: 55px; height: 55px; border-radius: 18px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 30px; }
        
        footer { padding: 50px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; background: #080808; }
        .footer-brand { font-family: 'Orbitron'; color: var(--neon); font-size: 14px; margin-bottom: 8px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="px-4 py-1 border-l-2 border-pink-500 bg-white/5 rounded-r-lg">
            <span class="font-black italic tracking-tighter">VØID_X <span class="text-pink-500">ELITE</span></span>
        </div>
        <div id="timer" class="font-[Orbitron] text-xs opacity-50">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-4 flex justify-between items-center sticky top-0 bg-[#050505] z-10 border-b border-white/10">
            <button onclick="closeDetails()" class="text-lg font-bold"><i class="fas fa-arrow-right ml-2"></i> إغلاق</button>
            <span class="font-[Orbitron] text-pink-500 text-sm tracking-widest">ELITE_PLAYER</span>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn bg-pink-600 shadow-lg shadow-pink-500/20" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="nav-btn" onclick="openAdmin()"><i class="fas fa-fingerprint text-pink-500"></i></div>
        <div class="nav-btn" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-6"><h1 class="font-[Orbitron] text-xl text-pink-500">SYSTEM_CONTROL</h1><i class="fas fa-times cursor-pointer" onclick="closeAdmin()"></i></div>
        <div id="admin-list" class="space-y-3"></div>
    </div>

    <div id="chat-ui" class="overlay flex-col">
        <div class="flex justify-between items-center mb-6"><h1 class="font-[Orbitron] text-xl text-pink-500">GLOBAL_SECURE</h1><i class="fas fa-times cursor-pointer" onclick="toggleChat()"></i></div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 p-4"></div>
        <div class="mt-4 flex gap-2"><input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-xl p-4 outline-none border border-white/10" placeholder="رسالة للمجتمع..."><button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-xl"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <footer>
        <div class="footer-brand">VØID_X ELITE SYSTEMS</div>
        <div class="text-[10px] opacity-40 uppercase tracking-widest">تاريخ التأسيس الآمن: 2024 - 2026</div>
        <div id="footer-date" class="text-xs mt-2 opacity-60"></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const USR_ID = "USR-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        const CURRENT_DATE = new Date().toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
        document.getElementById('footer-date').innerText = "تاريخ دخولك النظام: " + CURRENT_DATE;

        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب الفيديوهات للرئيسية
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const data = snap.val();
            if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const section = document.createElement('div');
                section.className = 'card';
                section.onclick = () => openDetails(id, v);
                section.innerHTML = `
                    <div class="video-container">
                        <video loop playsinline muted data-src="${v.url}"></video>
                    </div>
                    <div class="p-4 flex justify-between items-center">
                        <div class="text-xs font-bold opacity-70">عرض المحتوى والتعليقات</div>
                        <div class="text-pink-500 text-sm font-black font-[Orbitron]"><i class="fas fa-bolt"></i> ${v.likes || 0}</div>
                    </div>`;
                feed.appendChild(section);
            });
            observeFeed();
        });

        // فتح واجهة الفيديو الكاملة
        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            render.innerHTML = `
                <div class="details-content">
                    <div class="video-container rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-white/5">
                        <video controls autoplay src="${v.url}"></video>
                    </div>
                    
                    <div class="action-bar">
                        <div class="btn-action" onclick="likeVid(event, '${id}')">
                            <i class="fas fa-bolt"></i>
                            <span>${v.likes || 0} إعجاب</span>
                        </div>
                        <div class="btn-action" onclick="shareVid(event)">
                            <i class="fas fa-share-nodes"></i>
                            <span>مشاركة</span>
                        </div>
                        <div class="btn-action">
                            <i class="fas fa-clock"></i>
                            <span>${CURRENT_DATE}</span>
                        </div>
                    </div>

                    <div class="mt-6 px-2">
                        <h2 class="text-xl font-black text-white font-[Cairo]">تفاصيل المقطع الرقمي</h2>
                        <p class="text-xs opacity-50 mt-2 leading-relaxed italic">نظام التشفير VØID_X يضمن لك جودة عرض فائقة. هذا المحتوى مسجل تحت معايير النخبة.</p>
                        
                        <div class="comment-box">
                            <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-message text-pink-500"></i> التعليقات العامة</h3>
                            <div id="video-comments-${id}" class="space-y-4 max-h-72 overflow-y-auto mb-6 pr-2"></div>
                            <div class="flex gap-2 bg-black/40 p-2 rounded-2xl border border-white/5">
                                <input id="comm-input-${id}" class="bg-transparent flex-1 p-2 outline-none text-sm" placeholder="أضف بصمتك هنا...">
                                <button onclick="addComment('${id}')" class="bg-pink-600 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            loadComments(id);
        }

        function closeDetails() {
            document.getElementById('video-details-ui').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.querySelectorAll('#video-details-ui video').forEach(v => v.pause());
        }

        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input.value.trim()) return;
            db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`);
                if(!box) return;
                box.innerHTML = '';
                snap.forEach(c => {
                    const d = c.val();
                    box.innerHTML += `<div class="comment-item">
                        <div class="text-[10px] text-pink-500 font-black mb-1">${d.u}</div>
                        <div class="opacity-90">${d.t}</div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function likeVid(e, id) { e.stopPropagation(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid(e) { e.stopPropagation(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("ACCESS:") === "1234") document.getElementById('admin-ui').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }

        function sendMsg() { 
            const i = document.getElementById('msg-input'); 
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; } 
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-3 rounded-xl border-r-2 border-pink-500"><div class="text-[8px] text-pink-400 font-bold">${d.u}</div><div class="text-sm">${d.t}</div></div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck", sources: ['local'], resourceType: "video",
        }, (err, res) => {
            if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0});
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(!v.src) v.src = v.dataset.src; v.play().catch(()=>{}); } 
                    else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
