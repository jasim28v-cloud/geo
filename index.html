<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VØID_X | ELITE PLAYER 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #ff007f; --bg: #050505; }
        
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* تأثيرات 3D للخلفية */
        .v-container { max-width: 900px; margin: 100px auto; padding: 20px; }
        
        .video-card { 
            background: rgba(20, 20, 20, 0.6); 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* المشغل الاحترافي */
        .player-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 24px 24px 0 0; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px; display: flex; align-items: center; gap: 15px;
            opacity: 0; transition: 0.3s;
        }
        .player-box:hover .controls { opacity: 1; }

        /* قسم المعلومات والتعليقات */
        .info-section { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .about-site-3d { 
            background: linear-gradient(45deg, var(--neon), #4facfe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px;
        }

        .comment-input-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 10px; display: flex; gap: 10px; margin-top: 20px; }
        .comment-item { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; margin-top: 10px; border-right: 3px solid var(--neon); }

        /* الشات المنفصل */
        .chat-sidebar { 
            position: fixed; left: 20px; bottom: 100px; width: 300px; height: 400px;
            background: rgba(10,10,10,0.9); border: 1px solid var(--neon);
            border-radius: 20px; z-index: 1000; display: none; flex-direction: column;
            box-shadow: 0 0 20px var(--neon);
        }

        /* ناف بار جانبي */
        nav { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 2000; }
        .nav-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.05); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .nav-icon:hover { background: var(--neon); box-shadow: 0 0 15px var(--neon); }

    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-50 backdrop-blur-md">
        <div class="text-2xl font-black italic about-site-3d">VØID_X ELITE</div>
        <div id="date-now" class="text-[10px] font-[Orbitron] opacity-60">LOADING_DATE...</div>
    </header>

    <main class="v-container" id="video-feed"></main>

    <nav>
        <div class="nav-icon" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="nav-icon" onclick="toggleChat()"><i class="fas fa-comments"></i></div>
        <div class="nav-icon" onclick="openAdmin()"><i class="fas fa-user-shield"></i></div>
    </nav>

    <div id="global-chat" class="chat-sidebar">
        <div class="p-4 border-b border-white/10 flex justify-between">
            <span class="font-bold text-pink-500">GLOBAL_CHAT</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 text-xs space-y-3"></div>
        <div class="p-2 flex gap-1">
            <input id="chat-input" class="bg-white/5 flex-1 p-2 rounded-lg text-xs outline-none" placeholder="اكتب للجميع...">
            <button onclick="sendGlobalMsg()" class="bg-pink-600 px-3 rounded-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "GHOST-" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // تحديث التاريخ
        setInterval(() => {
            const now = new Date();
            document.getElementById('date-now').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        // جلب الفيديوهات
        db.ref('videos').on('value', snap => {
            const container = document.getElementById('video-feed');
            container.innerHTML = '';
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(vidId => {
                const v = data[vidId];
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="player-box">
                        <video id="vid-${vidId}" src="${v.url}" playsinline loop></video>
                        <div class="controls">
                            <button onclick="playVid('${vidId}')" class="text-xl"><i class="fas fa-play" id="btn-${vidId}"></i></button>
                            <div class="flex-1 h-1 bg-white/20 rounded-full overflow-hidden">
                                <div id="progress-${vidId}" class="h-full bg-pink-500" style="width: 0%"></div>
                            </div>
                            <button onclick="muteVid('${vidId}')"><i class="fas fa-volume-up" id="vol-${vidId}"></i></button>
                        </div>
                    </div>
                    
                    <div class="info-section">
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 class="about-site-3d text-lg">HYPER_CORE_VIDEO</h2>
                                <p class="text-xs opacity-40 mt-1">تم النشر في: ${new Date().toLocaleDateString()}</p>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="likeVid('${vidId}')" class="flex flex-col items-center">
                                    <i class="fas fa-bolt text-pink-500 text-xl"></i>
                                    <span class="text-[10px] mt-1">${v.likes || 0}</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mt-6">
                            <h3 class="text-xs font-bold mb-3 opacity-60"><i class="fas fa-comments mr-2"></i> التعليقات الحقيقية</h3>
                            <div id="comments-list-${vidId}" class="max-h-40 overflow-y-auto space-y-2 mb-4">
                                </div>
                            <div class="comment-input-box">
                                <input type="text" id="input-${vidId}" class="bg-transparent flex-1 outline-none text-sm" placeholder="أضف تعليقك هنا...">
                                <button onclick="addComment('${vidId}')" class="text-pink-500 px-2"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                loadComments(vidId);
                setupProgress(vidId);
            });
        });

        // تشغيل مخصص
        function playVid(id) {
            const v = document.getElementById(`vid-${id}`);
            const b = document.getElementById(`btn-${id}`);
            if(v.paused) { v.play(); b.className = 'fas fa-pause'; } 
            else { v.pause(); b.className = 'fas fa-play'; }
        }

        function setupProgress(id) {
            const v = document.getElementById(`vid-${id}`);
            const p = document.getElementById(`progress-${id}`);
            v.ontimeupdate = () => { p.style.width = (v.currentTime / v.duration * 100) + '%'; };
        }

        // نظام التعليقات الحقيقي لكل فيديو
        function addComment(vidId) {
            const input = document.getElementById(`input-${vidId}`);
            if(!input.value.trim()) return;
            db.ref(`comments/${vidId}`).push({
                user: USR_ID,
                text: input.value,
                time: Date.now()
            });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const list = document.getElementById(`comments-list-${vidId}`);
                list.innerHTML = '';
                snap.forEach(child => {
                    const c = child.val();
                    list.innerHTML += `
                        <div class="comment-item">
                            <span class="text-[9px] text-pink-500 font-bold">${c.user}</span>
                            <p class="text-xs opacity-80 mt-1">${c.text}</p>
                        </div>
                    `;
                });
            });
        }

        // شات عام (منفصل)
        function toggleChat() { 
            const c = document.getElementById('global-chat');
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendGlobalMsg() {
            const i = document.getElementById('chat-input');
            if(i.value.trim()) { db.ref('global_chat').push({u: USR_ID, t: i.value}); i.value = ''; }
        }

        db.ref('global_chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-2 rounded-lg"><b>${d.u}:</b> ${d.t}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        // الرفع والأدمن (نفس الإعدادات السابقة)
        const widget = cloudinary.createUploadWidget({ cloudName: "dk5kas1gc", uploadPreset: "go_kck" }, (err, res) => {
            if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0, date: Date.now()});
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function likeVid(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function openAdmin() { if(prompt("كود الدخول:") === "1234") alert("لوحة التحكم مفعلة"); }
    </script>
</body>
</html>
