<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER 3D | ULTRA ELITE v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #00f3ff; --accent: #ff007f; --bg: #1a0a2e; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-image: radial-gradient(circle at 50% 50%, #2d1b4d 0%, #1a0a2e 100%); }
        .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .viewport { max-width: 1000px; margin: 100px auto; padding: 15px; display: flex; flex-direction: column; gap: 50px; }
        .card { width: 100%; background: var(--glass); border-radius: 35px; overflow: hidden; border: 1px solid var(--border); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); backdrop-filter: blur(20px); cursor: pointer; }
        .card:hover { border-color: var(--neon); transform: translateY(-8px); box-shadow: 0 25px 50px rgba(0, 243, 255, 0.15); }
        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #video-details-ui { position: fixed; inset: 0; background: rgba(26, 10, 46, 0.99); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; backdrop-filter: blur(40px); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        .action-bar { display: flex; gap: 20px; margin-top: 25px; padding: 20px; background: var(--glass); border-radius: 25px; justify-content: space-around; border: 1px solid var(--border); }
        header { position: fixed; top: 0; width: 100%; padding: 20px 30px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; background: rgba(26, 10, 46, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); }
        nav { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .nav-btn { width: 68px; height: 68px; border-radius: 24px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(26, 10, 46, 0.97); z-index: 2000; display: none; padding: 35px; overflow-y: auto; }
        .fullscreen-trigger { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.5); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .fullscreen-trigger:hover { background: var(--neon); color: #000; transform: scale(1.1); }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="loading" class="loading-overlay">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <div class="font-[Orbitron] neon-text tracking-widest">AETHER_LOADING...</div>
    </div>

    <header>
        <div class="flex items-center gap-4 cursor-pointer" onclick="fireAd(ADS.siteName)">
            <div class="w-11 h-11 bg-cyan-500 rounded-2xl flex items-center justify-center rotate-45 border-2 border-white/20 shadow-[0_0_15px_rgba(0,243,255,0.4)]"><i class="fas fa-atom -rotate-45 text-black"></i></div>
            <span class="font-[Orbitron] font-black text-2xl tracking-widest neon-text">AETHER 3D</span>
        </div>
        <div id="timer" class="font-[Orbitron] text-sm opacity-60 px-5 py-1.5 rounded-full border border-white/10 bg-white/5">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-6 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-xl z-10 border-b border-white/10">
            <button onclick="closeDetails()" class="flex items-center gap-3 font-bold hover:text-cyan-400 transition text-lg"><i class="fas fa-long-arrow-alt-right text-2xl"></i> العودة للأثير</button>
            <div class="text-[10px] font-[Orbitron] tracking-[5px] opacity-40">ENCRYPTED_CORE_v4</div>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn bg-pink-600" id="upload-btn"><i class="fas fa-plus text-white"></i></div>
        <div class="nav-btn bg-white/5" onclick="openAdmin()"><i class="fas fa-fingerprint text-cyan-400"></i></div>
        <div class="nav-btn bg-white/5" onclick="toggleChat()"><i class="fas fa-satellite-dish text-pink-500"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-10 sticky top-0 bg-[#1a0a2e] py-4 border-b border-white/5"><h1 class="font-[Orbitron] text-2xl neon-text">CORE_CONTROL</h1><i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="closeAdmin()"></i></div>
        <div id="admin-list" class="space-y-4 pb-20"></div>
    </div>

    <div id="chat-ui" class="overlay flex-col">
        <div class="flex justify-between items-center mb-8"><h1 class="font-[Orbitron] text-2xl accent-text">AETHER_LOGS</h1><i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="toggleChat()"></i></div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 p-6 bg-white/5 rounded-[30px] mb-4 border border-white/5 shadow-inner"></div>
        <div class="flex gap-3"><input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-5 outline-none border border-white/10 focus:border-cyan-500 transition shadow-lg" placeholder="رسالة مشفرة..."><button onclick="sendMsg()" class="bg-cyan-500 px-8 rounded-2xl text-black font-black hover:bg-cyan-400 transition shadow-[0_0_15px_rgba(0,243,255,0.3)]"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <footer>
        <div class="footer-brand neon-text font-black">AETHER 3D</div>
        <div id="footer-date" class="text-xs opacity-50 font-bold mt-3 tracking-widest"></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        const CURRENT_DATE = new Date().toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });

        const ADS = {
            like: "https://www.effectivegatecpm.com/ywn2a0wz7?key=7433561eca4a0920fafc9d653809bab2",
            share: "https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90",
            comment: "", 
            siteName: "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        };

        function fireAd(link) { if(link) window.open(link, '_blank'); }
        function goFullScreen() { const vid = document.getElementById('main-player'); if(vid.requestFullscreen) vid.requestFullscreen(); else if(vid.webkitRequestFullscreen) vid.webkitRequestFullscreen(); }

        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        document.getElementById('footer-date').innerText = "تاريخ المزامنة: " + CURRENT_DATE;

        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            if(!data) return;
            feed.innerHTML = ''; adminList.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetails(id, v);
                card.innerHTML = `<div class="video-container"><video loop playsinline controlsList="nodownload" oncontextmenu="return false" data-src="${v.url}"></video></div><div class="p-6 flex justify-between items-center"><div><span class="text-xs font-[Orbitron] text-cyan-500 font-bold">NODE_${id.substring(1,6)}</span></div><div class="text-pink-500"><i class="fas fa-bolt"></i> ${v.likes || 0}</div></div>`;
                feed.appendChild(card);
                adminList.innerHTML += `<div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl mb-2"><span>${id}</span><button onclick="deleteVid('${id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
            });
            observeFeed();
        });

        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            render.innerHTML = `
                <div class="max-w-[900px] mx-auto p-4 pb-20">
                    <div class="video-container rounded-[40px] relative shadow-2xl">
                        <video id="main-player" controls autoplay controlsList="nodownload" oncontextmenu="return false" src="${v.url}"></video>
                        <div class="fullscreen-trigger" onclick="goFullScreen()"><i class="fas fa-expand"></i></div>
                    </div>
                    <div class="action-bar mt-6">
                        <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="likeVid(event, '${id}')"><i class="fas fa-atom text-2xl text-cyan-400"></i><span class="font-[Orbitron]">${v.likes || 0}</span></div>
                        <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="shareVid(event)"><i class="fas fa-share-alt text-2xl"></i><span>توزيع</span></div>
                    </div>
                    <div class="mt-10 bg-white/5 p-6 rounded-3xl border border-white/10">
                        <h3 class="font-black mb-4"><i class="fas fa-satellite"></i> LOG_MESSAGES</h3>
                        <div id="video-comments-${id}" class="space-y-3 max-h-[300px] overflow-y-auto mb-6"></div>
                        <div class="flex gap-2">
                            <input id="comm-input-${id}" class="bg-white/5 flex-1 p-4 rounded-xl outline-none" placeholder="اكتب تعليقك...">
                            <button onclick="addComment('${id}')" class="bg-cyan-500 px-6 rounded-xl text-black"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>`;
            loadComments(id);
        }

        function closeDetails() { document.getElementById('video-details-ui').style.display = 'none'; document.body.style.overflow = 'auto'; const p = document.getElementById('main-player'); if(p) p.pause(); }
        function likeVid(e, id) { e.stopPropagation(); fireAd(ADS.like); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid(e) { e.stopPropagation(); fireAd(ADS.share); if(navigator.share) navigator.share({url: window.location.href}); }
        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input.value.trim()) return;
            db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`);
                if(!box) return; box.innerHTML = '';
                snap.forEach(c => { const d = c.val(); box.innerHTML += `<div class="bg-white/5 p-3 rounded-xl border-l-2 border-cyan-500 text-sm"><b>${d.u}:</b> ${d.t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        function openAdmin() { if(prompt("كلمة السر:") === "1234") document.getElementById('admin-ui').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function deleteVid(id) { if(confirm("حذف؟")) db.ref(`videos/${id}`).remove(); }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }
        function sendMsg() { const i = document.getElementById('msg-input'); if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; } }
        
        db.ref('chat').limitToLast(10).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => { const d = m.val(); b.innerHTML += `<div class="bg-white/5 p-3 rounded-xl mb-2"><b>${d.u}:</b> ${d.t}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            sources: ['local'], resourceType: "video",
            styles: { palette: { window: "#1a0a2e", windowBorder: "#00f3ff", tabIcon: "#00f3ff", textLight: "#FFFFFF", textDark: "#000000", action: "#ff007f", inactiveTabIcon: "#8E9192", error: "#E24E24", inProgress: "#00f3ff", complete: "#20B832", sourceBg: "#1a0a2e" } }
        }, (err, res) => {
            if(res.event === "uploading") document.getElementById('loading').style.display = 'flex';
            if(!err && res.event === "success") {
                document.getElementById('loading').style.display = 'none';
                const desc = prompt("وصف الفيديو:");
                db.ref('videos').push({ url: res.info.secure_url, likes: 0, desc: desc || "" });
            } else if (err) document.getElementById('loading').style.display = 'none';
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(!v.src) v.src = v.dataset.src; v.play().catch(()=>{}); } else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
