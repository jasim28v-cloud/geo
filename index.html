<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER_X | THE ELITE EXPERIENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { 
            --neon: #00f3ff; 
            --accent: #ff007f;
            --bg: #020205; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth;
            background-image: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
        }
        
        /* تأثير النيون على النصوص */
        .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .accent-text { text-shadow: 0 0 10px var(--accent); }

        .viewport { max-width: 1000px; margin: 100px auto; padding: 15px; display: flex; flex-direction: column; gap: 50px; }

        /* كارت أيوني فخم */
        .card { 
            width: 100%; background: var(--glass); border-radius: 30px; overflow: hidden; 
            border: 1px solid var(--border); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(20px); cursor: pointer; position: relative;
        }
        .card:hover { 
            border-color: var(--neon); transform: scale(1.02) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 243, 255, 0.1);
        }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* واجهة التفاصيل الأيونية */
        #video-details-ui { 
            position: fixed; inset: 0; background: rgba(2, 2, 5, 0.98); 
            z-index: 3000; display: none; flex-direction: column; overflow-y: auto;
            backdrop-filter: blur(30px);
        }
        
        .action-bar { 
            display: flex; gap: 20px; margin-top: 25px; padding: 20px; 
            background: var(--glass); border-radius: 25px; justify-content: space-around;
            border: 1px solid var(--border);
        }
        
        .btn-action { 
            display: flex; flex-direction: column; align-items: center; gap: 8px; 
            font-size: 12px; transition: 0.3s; color: #fff; font-weight: bold;
        }
        .btn-action i { font-size: 24px; filter: drop-shadow(0 0 5px var(--neon)); transition: 0.3s; }
        .btn-action:hover i { transform: translateY(-5px); filter: drop-shadow(0 0 15px var(--neon)); }

        header { 
            position: fixed; top: 0; width: 100%; padding: 20px 30px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(2, 2, 5, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        
        /* تصميم الأيقونات الجانبية */
        nav { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .nav-btn { 
            width: 65px; height: 65px; border-radius: 22px; background: var(--glass); 
            backdrop-filter: blur(15px); border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; color: #fff; transition: 0.4s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .nav-btn:hover { background: var(--neon); color: #000; transform: rotate(10deg) scale(1.1); box-shadow: 0 0 30px var(--neon); }
        .nav-btn.upload { background: var(--accent); border-color: var(--accent); }
        .nav-btn.upload:hover { box-shadow: 0 0 30px var(--accent); background: var(--accent); color: #fff; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; padding: 30px; }
        
        footer { padding: 60px 20px; text-align: center; background: linear-gradient(to top, #050510, transparent); }
        .footer-brand { font-family: 'Orbitron'; color: var(--neon); font-size: 18px; font-weight: 900; letter-spacing: 5px; }

        /* تخصيص السكرول بار */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center rotate-45 border-2 border-white/20">
                <i class="fas fa-atom -rotate-45 text-black"></i>
            </div>
            <span class="font-[Orbitron] font-black text-2xl tracking-widest neon-text">AETHER_X</span>
        </div>
        <div id="timer" class="font-[Orbitron] text-sm opacity-50 bg-white/5 px-4 py-1 rounded-full border border-white/10">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-10 border-b border-white/10">
            <button onclick="closeDetails()" class="flex items-center gap-3 font-bold hover:text-cyan-400 transition">
                <i class="fas fa-long-arrow-alt-right text-2xl"></i> العودة للأثير
            </button>
            <div class="text-[10px] font-[Orbitron] tracking-[5px] opacity-40">ENCRYPTED_STREAM</div>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn upload" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="nav-btn" onclick="openAdmin()"><i class="fas fa-fingerprint text-cyan-400"></i></div>
        <div class="nav-btn" onclick="toggleChat()"><i class="fas fa-satellite-dish text-pink-500"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-10"><h1 class="font-[Orbitron] text-2xl neon-text">CORE_CONTROL</h1><i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="closeAdmin()"></i></div>
        <div id="admin-list" class="space-y-4"></div>
    </div>

    <div id="chat-ui" class="overlay flex-col">
        <div class="flex justify-between items-center mb-8"><h1 class="font-[Orbitron] text-2xl accent-text">AETHER_LOGS</h1><i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="toggleChat()"></i></div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 p-6 bg-white/5 rounded-3xl mb-4 border border-white/5"></div>
        <div class="flex gap-3"><input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-5 outline-none border border-white/10 focus:border-cyan-500 transition" placeholder="أرسل إشارة مشفرة..."><button onclick="sendMsg()" class="bg-cyan-500 px-8 rounded-2xl text-black font-bold hover:bg-cyan-400 transition"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <footer>
        <div class="footer-brand neon-text">AETHER_X</div>
        <div class="text-[10px] opacity-30 uppercase tracking-[10px] my-4 font-[Orbitron]">Virtual Elite Interface</div>
        <div id="footer-date" class="text-xs opacity-50 font-bold"></div>
        <div class="mt-8 opacity-20 text-[10px]">DESIGNED FOR THE NEXT GENERATION OF ELITE USERS</div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        const CURRENT_DATE = new Date().toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
        document.getElementById('footer-date').innerText = "تاريخ المزامنة الحالية: " + CURRENT_DATE;

        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب الفيديوهات
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const data = snap.val();
            if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const section = document.createElement('div');
                section.className = 'card';
                section.onclick = () => openDetails(id, v);
                section.innerHTML = `
                    <div class="video-container">
                        <video loop playsinline muted data-src="${v.url}"></video>
                        <div class="absolute top-5 left-5 bg-black/50 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] border border-white/10 font-[Orbitron]">8K ULTRA</div>
                    </div>
                    <div class="p-6 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-cyan-500 tracking-widest font-[Orbitron]">STREAM_ID_${id.substring(1,5)}</span>
                            <span class="text-[10px] opacity-40">اضغط للاستكشاف الكامل</span>
                        </div>
                        <div class="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                            <i class="fas fa-bolt text-pink-500"></i>
                            <span class="font-black font-[Orbitron]">${v.likes || 0}</span>
                        </div>
                    </div>`;
                feed.appendChild(section);
            });
            observeFeed();
        });

        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            render.innerHTML = `
                <div class="details-content">
                    <div class="video-container rounded-[35px] shadow-[0_0_100px_rgba(0,243,255,0.15)] border border-white/10">
                        <video controls autoplay src="${v.url}"></video>
                    </div>
                    
                    <div class="action-bar">
                        <div class="btn-action" onclick="likeVid(event, '${id}')">
                            <i class="fas fa-atom"></i>
                            <span class="font-[Orbitron]">${v.likes || 0} PULSE</span>
                        </div>
                        <div class="btn-action" onclick="shareVid(event)">
                            <i class="fas fa-project-diagram"></i>
                            <span>توزيع</span>
                        </div>
                        <div class="btn-action">
                            <i class="fas fa-fingerprint"></i>
                            <span>${CURRENT_DATE}</span>
                        </div>
                    </div>

                    <div class="mt-10 px-4">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-1 h-8 bg-cyan-500 rounded-full"></div>
                            <h2 class="text-2xl font-black text-white">تفاصيل الأثير الرقمي</h2>
                        </div>
                        <p class="text-sm opacity-50 leading-relaxed font-light mb-10">هذا المقطع تم حقنه داخل بروتوكول AETHER_X لضمان جودة بصرية مذهلة. استمتع بتجربة النخبة.</p>
                        
                        <div class="bg-white/2 rounded-[40px] p-8 border border-white/5 mb-20">
                            <h3 class="font-bold mb-8 flex items-center gap-3 font-[Orbitron] neon-text"><i class="fas fa-satellite text-sm"></i> LOG_MESSAGES</h3>
                            <div id="video-comments-${id}" class="space-y-6 max-h-[400px] overflow-y-auto mb-8 pr-4"></div>
                            <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/5">
                                <input id="comm-input-${id}" class="bg-transparent flex-1 p-3 outline-none text-sm" placeholder="أدخل تعليقك في الأثير...">
                                <button onclick="addComment('${id}')" class="bg-cyan-500 w-14 h-14 rounded-xl flex items-center justify-center text-black hover:scale-110 transition"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            loadComments(id);
        }

        function closeDetails() {
            document.getElementById('video-details-ui').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.querySelectorAll('#video-details-ui video').forEach(v => v.pause());
        }

        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input.value.trim()) return;
            db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`);
                if(!box) return; box.innerHTML = '';
                snap.forEach(c => {
                    const d = c.val();
                    box.innerHTML += `<div class="bg-white/2 p-4 rounded-2xl border-l-4 border-cyan-500 transition hover:bg-white/5">
                        <div class="text-[9px] font-[Orbitron] text-cyan-400 font-black mb-2">${d.u}</div>
                        <div class="text-sm font-light text-white/90">${d.t}</div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function likeVid(e, id) { e.stopPropagation(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid(e) { e.stopPropagation(); if(navigator.share) navigator.share({url: window.location.href}); }
        function openAdmin() { if(prompt("ACCESS:") === "1234") document.getElementById('admin-ui').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }

        function sendMsg() { 
            const i = document.getElementById('msg-input'); 
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; } 
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/2 p-4 rounded-2xl border-r-2 border-pink-500"><div class="text-[8px] font-[Orbitron] text-pink-400 font-bold mb-1">${d.u}</div><div class="text-sm font-light">${d.t}</div></div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck", sources: ['local'], resourceType: "video",
        }, (err, res) => {
            if(!err && res.event === "success") { db.ref('videos').push({url: res.info.secure_url, likes: 0}); alert("تم حقن الفيديو في الأثير!"); }
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(!v.src) v.src = v.dataset.src; v.play().catch(()=>{}); } 
                    else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
