<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | PREMIUM ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #ff007f; --bg: #0a0a0a; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        .viewport { max-width: 1000px; margin: 80px auto; padding: 10px; display: flex; flex-direction: column; gap: 40px; }

        /* كارت الفيديو الرئيسي */
        .card { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--neon); }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* واجهة التفاصيل (Popup) */
        #video-details-ui { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .details-content { max-width: 1000px; margin: 0 auto; width: 100%; padding: 20px; }
        
        /* شريط التعليقات */
        .comment-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .comment-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .action-buttons { display: flex; gap: 12px; }
        .btn-mini { padding: 10px 18px; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        header { position: fixed; top: 0; width: 100%; padding: 15px 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        nav { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .nav-btn { width: 55px; height: 55px; border-radius: 18px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; transition: 0.3s; }
        .nav-btn:hover { background: var(--neon); box-shadow: 0 0 20px var(--neon); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 30px; }
        
        footer { padding: 40px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; opacity: 0.5; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="px-4 py-1 border-l-2 border-pink-500 bg-white/5 rounded-r-lg">
            <span class="font-black italic tracking-tighter">VØID_X <span class="text-pink-500">ELITE</span></span>
        </div>
        <div id="timer" class="font-[Orbitron] text-xs opacity-50">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-4 flex justify-between items-center sticky top-0 bg-black z-10 border-b border-white/10">
            <button onclick="closeDetails()" class="text-2xl"><i class="fas fa-chevron-right ml-2"></i> عودة</button>
            <span class="font-[Orbitron] text-pink-500">VIDEO_DETAILS</span>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn bg-pink-600" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="nav-btn" onclick="openAdmin()"><i class="fas fa-fingerprint text-pink-500"></i></div>
        <div class="nav-btn" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-6"><h1 class="font-[Orbitron] text-xl text-pink-500">SYSTEM_CONTROL</h1><i class="fas fa-times cursor-pointer" onclick="closeAdmin()"></i></div>
        <div id="admin-list" class="space-y-3"></div>
    </div>

    <div id="chat-ui" class="overlay flex-col">
        <div class="flex justify-between items-center mb-6"><h1 class="font-[Orbitron] text-xl text-pink-500 tracking-widest">GLOBAL_CHAT</h1><i class="fas fa-times cursor-pointer" onclick="toggleChat()"></i></div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 p-4"></div>
        <div class="mt-4 flex gap-2"><input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-xl p-4 outline-none" placeholder="اكتب رسالة..."><button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-xl"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <footer>
        <div class="font-[Orbitron] text-pink-500 mb-2">VØID_X CORE SYSTEM v3.0</div>
        <div>تاريخ تأسيس النظام: 2024-2026</div>
        <div id="footer-date"></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isMuted = true;
        let cachedVideos = {};
        const USR_ID = "ELITE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        const CURRENT_DATE = new Date().toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
        document.getElementById('footer-date').innerText = "تاريخ اليوم: " + CURRENT_DATE;

        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب الفيديوهات للرئيسية
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const data = snap.val();
            if(!data) return;
            cachedVideos = data; 
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const section = document.createElement('div');
                section.className = 'card';
                section.onclick = () => openDetails(id, v);
                section.innerHTML = `
                    <div class="video-container">
                        <video loop playsinline muted data-src="${v.url}"></video>
                    </div>
                    <div class="p-4 flex justify-between items-center">
                        <span class="text-xs opacity-60">مشاهدة التفاصيل والتعليقات..</span>
                        <div class="text-pink-500"><i class="fas fa-bolt"></i> ${v.likes || 0}</div>
                    </div>`;
                feed.appendChild(section);
            });
            observeFeed();
        });

        // واجهة التفاصيل عند الضغط
        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            render.innerHTML = `
                <div class="details-content">
                    <div class="video-container rounded-2xl overflow-hidden shadow-2xl border border-white/10">
                        <video controls autoplay src="${v.url}"></video>
                    </div>
                    <div class="mt-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold text-pink-500 font-[Orbitron]">ELITE_STREAM_${id.substring(1,7)}</h2>
                            <button onclick="likeVid(event, '${id}')" class="btn-mini bg-pink-600"><i class="fas fa-bolt"></i> ${v.likes || 0}</button>
                        </div>
                        <p class="text-sm opacity-60 mt-4 leading-relaxed">وصف الفيديو: تم معالجة هذا المقطع عبر بروتوكولات VØID_X لضمان دقة عالية وتجربة مستخدم مميزة. تاريخ النشر: ${CURRENT_DATE}</p>
                        
                        <div class="comment-box">
                            <h3 class="font-bold mb-4 border-b border-white/10 pb-2"><i class="fas fa-comments text-pink-500"></i> التعليقات</h3>
                            <div id="video-comments-${id}" class="space-y-3 max-h-60 overflow-y-auto mb-4"></div>
                            <div class="flex gap-2">
                                <input id="comm-input-${id}" class="bg-white/5 flex-1 p-3 rounded-lg outline-none" placeholder="أضف تعليقك...">
                                <button onclick="addComment('${id}')" class="bg-pink-600 px-4 rounded-lg"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            loadComments(id);
        }

        function closeDetails() {
            document.getElementById('video-details-ui').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.querySelectorAll('#video-details-ui video').forEach(v => v.pause());
        }

        // نظام التعليقات الحقيقي لكل فيديو
        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input.value.trim()) return;
            db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value, d: CURRENT_DATE });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`);
                if(!box) return;
                box.innerHTML = '';
                snap.forEach(c => {
                    const d = c.val();
                    box.innerHTML += `<div class="comment-item"><span class="text-pink-500 font-bold">${d.u}:</span> ${d.t} <div class="text-[9px] opacity-30">${d.d}</div></div>`;
                });
            });
        }

        // الوظائف الأساسية (لايك، شات، أدمن)
        function likeVid(e, id) { e.stopPropagation(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function openAdmin() { if(prompt("رمز الدخول:") === "1234") document.getElementById('admin-ui').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }

        function sendMsg() { 
            const i = document.getElementById('msg-input'); 
            if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; } 
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                b.innerHTML += `<div class="bg-white/5 p-3 rounded-xl border-r-2 border-pink-500"><div class="text-[8px] text-pink-400 font-bold">${d.u}</div><div>${d.t}</div></div>`;
            });
        });

        // الرفع من الاستوديو
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck", sources: ['local'], resourceType: "video",
        }, (err, res) => {
            if(!err && res.event === "success") db.ref('videos').push({url: res.info.secure_url, likes: 0});
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(!v.src) v.src = v.dataset.src; v.play().catch(()=>{}); } 
                    else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
