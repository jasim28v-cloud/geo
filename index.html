<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER_X | ULTRA ELITE v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #ff004c; --accent: #ff007f; --bg: #1a0000; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-image: radial-gradient(circle at 50% 50%, #4a0000 0%, #1a0000 100%); }
        .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .viewport { max-width: 1000px; margin: 100px auto; padding: 15px; display: flex; flex-direction: column; gap: 50px; }
        .card { width: 100%; background: var(--glass); border-radius: 35px; overflow: hidden; border: 1px solid var(--border); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); backdrop-filter: blur(20px); cursor: pointer; }
        .card:hover { border-color: var(--neon); transform: translateY(-8px); box-shadow: 0 25px 50px rgba(255, 0, 76, 0.2); }
        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; border-radius: inherit; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #video-details-ui { position: fixed; inset: 0; background: rgba(26, 0, 0, 0.99); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; backdrop-filter: blur(40px); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        .action-bar { display: flex; gap: 20px; margin-top: 25px; padding: 20px; background: var(--glass); border-radius: 25px; justify-content: space-around; border: 1px solid var(--border); }
        .btn-action { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 12px; transition: 0.3s; color: #fff; font-weight: bold; cursor: pointer; }
        header { position: fixed; top: 0; width: 100%; padding: 20px 30px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; background: rgba(26, 0, 0, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); }
        .logo-3d { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 24px; color: #fff; text-shadow: 2px 2px 0px #ff004c, -1px -1px 0px #00f3ff; letter-spacing: 2px; }
        nav { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .nav-btn { width: 68px; height: 68px; border-radius: 24px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(26, 0, 0, 0.97); z-index: 2000; display: none; padding: 35px; overflow-y: auto; }
        .admin-stat-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 15px; text-align: center; }
        footer { padding: 80px 20px; text-align: center; background: linear-gradient(to top, #300000, transparent); border-top: 1px solid var(--border); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading" class="loading-overlay">
        <div class="w-16 h-16 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <div id="loading-text" class="font-[Orbitron] neon-text tracking-widest uppercase">Initializing...</div>
    </div>

    <header>
        <div class="flex items-center gap-4 cursor-pointer" onclick="fireAd(ADS.siteName)">
            <div class="logo-3d">3D</div>
            <span class="font-[Orbitron] font-black text-2xl tracking-widest neon-text">AETHER_X</span>
        </div>
        <div id="timer" class="font-[Orbitron] text-sm opacity-60 px-5 py-1.5 rounded-full border border-white/10 bg-white/5">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-6 flex justify-between items-center sticky top-0 bg-red-950/90 backdrop-blur-xl z-10 border-b border-white/10">
            <button onclick="closeDetails()" class="flex items-center gap-3 font-bold hover:text-red-400 transition text-lg"><i class="fas fa-long-arrow-alt-right text-2xl"></i> العودة للأثير</button>
            <div class="text-[10px] font-[Orbitron] tracking-[5px] opacity-40">ELITE_CORE_v4</div>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn bg-pink-600 shadow-[0_0_20px_rgba(219,39,119,0.5)]" id="upload-btn"><i class="fas fa-plus text-white"></i></div>
        <div class="nav-btn bg-white/5" onclick="openAdmin()"><i class="fas fa-fingerprint text-red-400"></i></div>
        </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-10 sticky top-0 bg-[#1a0000] py-4 border-b border-white/5">
            <h1 class="font-[Orbitron] text-2xl neon-text">CORE_CONTROL</h1>
            <i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="closeAdmin()"></i>
        </div>
        
        <div class="grid grid-cols-3 gap-3 mb-10 text-[Orbitron]">
            <div class="admin-stat-card"><div class="text-red-500 text-xl font-black" id="total-vids">0</div><div class="text-[8px] opacity-50 uppercase">Nodes</div></div>
            <div class="admin-stat-card"><div class="text-red-500 text-xl font-black" id="total-pulse">0</div><div class="text-[8px] opacity-50 uppercase">Pulse</div></div>
            <div class="admin-stat-card"><div class="text-green-500 text-xl font-black" id="admin-audience">0</div><div class="text-[8px] opacity-50 uppercase">Live_Users</div></div>
        </div>

        <div id="admin-list" class="space-y-4 pb-20"></div>
    </div>

    <footer>
        <div class="footer-brand neon-text font-black">AETHER_X</div>
        <div id="footer-date" class="text-xs opacity-50 font-bold mt-3 tracking-widest uppercase"></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        const CURRENT_DATE = new Date().toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });

        const ADS = {
            like: "https://www.effectivegatecpm.com/ywn2a0wz7?key=7433561eca4a0920fafc9d653809bab2",
            share: "https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90",
            download: "https://www.effectivegatecpm.com/t3rvmzpu?key=26330eef1cb397212db567d1385dc0b9", 
            siteName: "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        };

        function fireAd(link) { window.open(link, '_blank'); }

        // نظام عد الجمهور (لوحة التحكم فقط)
        const connectionsRef = db.ref('status');
        const connectedRef = db.ref('.info/connected');
        connectedRef.on('value', (snap) => {
            if (snap.val() === true) {
                const con = connectionsRef.push(true);
                con.onDisconnect().remove();
            }
        });
        connectionsRef.on('value', (snap) => {
            const el = document.getElementById('admin-audience');
            if(el) el.innerText = snap.numChildren();
        });

        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        document.getElementById('footer-date').innerText = "SYNC_DATE: " + CURRENT_DATE;

        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            let pulses = 0;
            if(!data) { feed.innerHTML = ""; adminList.innerHTML = ""; return; }
            feed.innerHTML = ''; adminList.innerHTML = '';
            
            const keys = Object.keys(data).reverse();
            document.getElementById('total-vids').innerText = keys.length;

            keys.forEach(id => {
                const v = data[id];
                pulses += (v.likes || 0);
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetails(id, v);
                card.innerHTML = `
                    <div class="video-container">
                        <video loop playsinline muted controlsList="nodownload" disablePictureInPicture data-src="${v.url}"></video>
                    </div>
                    <div class="p-6 flex justify-between items-center">
                        <div>
                            <span class="text-xs font-black text-red-500 font-[Orbitron] tracking-tighter">NODE_${id.substring(1,6)}</span>
                            <p class="text-[10px] opacity-40 truncate w-48 mt-1">${v.desc || ""}</p>
                        </div>
                        <div class="bg-white/5 px-4 py-2 rounded-xl border border-white/5 font-[Orbitron] flex items-center gap-2">
                            <i class="fas fa-bolt text-red-500 animate-pulse"></i> ${v.likes || 0}
                        </div>
                    </div>`;
                adminList.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex items-center gap-4 mb-2 border border-white/10">
                    <video class="w-16 h-16 rounded-lg object-cover" src="${v.url}"></video>
                    <div class="flex-1 text-[10px]"><div class="text-red-500 font-bold mb-1">${id}</div><div class="opacity-50">${v.likes || 0} PULSE</div></div>
                    <button onclick="deleteVid('${id}')" class="w-10 h-10 bg-red-600/20 text-red-500 rounded-xl"><i class="fas fa-trash"></i></button>
                </div>`;
                feed.appendChild(card);
            });
            document.getElementById('total-pulse').innerText = pulses;
            observeFeed();
        });

        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            render.innerHTML = `
                <div class="details-content max-w-[900px] mx-auto p-4 pb-20">
                    <div class="video-container rounded-[40px] border border-white/10 shadow-[0_0_80px_rgba(0,0,0,0.8)] overflow-hidden">
                        <video id="main-player" controls autoplay playsinline src="${v.url}"></video>
                    </div>
                    <div class="action-bar shadow-xl">
                        <div class="btn-action" onclick="likeVid(event, '${id}')"><i class="fas fa-heart text-red-500"></i><span class="font-[Orbitron]">${v.likes || 0}</span></div>
                        <div class="btn-action" onclick="downloadVid('${v.url}')"><i class="fas fa-cloud-download-alt text-red-400"></i><span>حفظ</span></div>
                        <div class="btn-action" onclick="shareVid(event)"><i class="fas fa-project-diagram"></i><span>توزيع</span></div>
                        <div class="btn-action"><i class="fas fa-fingerprint"></i><span class="text-[10px] opacity-60">${CURRENT_DATE}</span></div>
                    </div>
                    <div class="mt-12 px-4">
                        <h2 class="text-2xl font-black text-white mb-5 flex items-center gap-3"><span class="w-1.5 h-8 bg-red-600 rounded-full"></span> تفاصيل المقطع</h2>
                        <div class="bg-white/5 p-7 rounded-3xl border border-white/5 text-sm opacity-80 leading-relaxed shadow-lg">${v.desc || "مقطع رقمي مسجل في الأثير."}</div>
                        <div id="video-comments-${id}" class="mt-10 space-y-4 max-h-[350px] overflow-y-auto mb-8 pr-4 custom-scroll"></div>
                        <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/10">
                            <input id="comm-input-${id}" class="bg-transparent flex-1 p-3 outline-none text-sm" placeholder="أدخل تعليقك...">
                            <button onclick="addComment('${id}')" class="bg-red-600 w-14 h-14 rounded-2xl text-white"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('main-player').muted = false;
            loadComments(id);
        }

        async function downloadVid(url) {
            fireAd(ADS.download);
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').innerText = "SAVING_TO_DEVICE...";
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `Aether_Elite_${Date.now()}.mp4`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            } catch (e) { alert("ERROR_DOWNLOADING"); }
            document.getElementById('loading').style.display = 'none';
        }

        function closeDetails() { 
            document.getElementById('video-details-ui').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
            const p = document.getElementById('main-player'); if(p) p.pause();
        }

        function likeVid(e, id) { e.stopPropagation(); fireAd(ADS.like); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid(e) { e.stopPropagation(); fireAd(ADS.share); if(navigator.share) navigator.share({url: window.location.href}); }
        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input || !input.value.trim()) return;
            db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`);
                if(!box) return; box.innerHTML = '';
                snap.forEach(c => {
                    const d = c.val();
                    box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-l-4 border-red-500 mb-2"><div class="text-[8px] font-[Orbitron] text-red-400 font-bold mb-1 tracking-widest">${d.u}</div><div class="text-sm opacity-90">${d.t}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function openAdmin() { if(prompt("ACCESS_CODE:") === "1234") document.getElementById('admin-ui').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function deleteVid(id) { if(confirm("DELETE_NODE_PERMANENTLY?")) db.ref(`videos/${id}`).remove(); }

        // نظام رفع محسن ومباشر
        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck",
            sources: ['local'], resourceType: "video",
            multiple: false
        }, (err, res) => {
            if(res.event === "uploading") {
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('loading-text').innerText = "INJECTING_NODE...";
            }
            if(!err && res.event === "success") {
                document.getElementById('loading').style.display = 'none';
                const desc = prompt("أدخل وصف الحقن:");
                db.ref('videos').push({ url: res.info.secure_url, likes: 0, desc: desc || "" });
                alert("تم التزامن مع الأثير بنجاح!");
            }
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(!v.src) v.src = v.dataset.src; v.play().catch(()=>{}); } else { v.pause(); }
                });
            }, { threshold: 0.65 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
