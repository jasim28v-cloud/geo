<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER_X | ULTRA ELITE v4.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #00f3ff; --accent: #ff007f; --bg: #020205; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        
        /* منع أي محاولة لسحب المحتوى */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-image: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%); }
        .viewport { max-width: 1000px; margin: 100px auto; padding: 15px; display: flex; flex-direction: column; gap: 50px; }
        .card { width: 100%; background: var(--glass); border-radius: 35px; overflow: hidden; border: 1px solid var(--border); transition: 0.6s; backdrop-filter: blur(20px); cursor: pointer; }
        
        /* مشغل الفيديو الحديث - إخفاء التحميل نهائياً */
        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
        
        /* الكود السحري لإخفاء زر التحميل من المتصفحات */
        video::-webkit-media-controls-enclosure { overflow: hidden !important; }
        video::-webkit-media-controls-panel { width: calc(100% + 35px) !important; /* دفع الأزرار خارج الشاشة قليلاً لإخفاء الثلاث نقاط */ }
        video::-internal-media-controls-download-button { display: none !important; }
        video::-webkit-media-controls-download-button { display: none !important; }
        
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #video-details-ui { position: fixed; inset: 0; background: rgba(2, 2, 5, 0.99); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; backdrop-filter: blur(40px); }
        header { position: fixed; top: 0; width: 100%; padding: 20px 30px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; background: rgba(2, 2, 5, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); }
        nav { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .nav-btn { width: 68px; height: 68px; border-radius: 24px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; transition: 0.4s; }
        .nav-btn.upload { background: var(--accent); border-color: var(--accent); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; display: none; padding: 35px; overflow-y: auto; }
        footer { padding: 80px 20px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body oncontextmenu="return false;"> <header>
        <div class="flex items-center gap-4 cursor-pointer" onclick="fireAd(ADS.siteName)">
            <div class="w-11 h-11 bg-cyan-500 rounded-2xl flex items-center justify-center rotate-45 border-2 border-white/20"><i class="fas fa-atom -rotate-45 text-black"></i></div>
            <span class="font-[Orbitron] font-black text-2xl tracking-widest text-[#00f3ff]" style="text-shadow: 0 0 10px #00f3ff;">AETHER_X</span>
        </div>
        <div id="timer" class="font-[Orbitron] text-sm opacity-60 px-5 py-1.5 rounded-full border border-white/10 bg-white/5">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-6 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-xl z-10 border-b border-white/10">
            <button onclick="closeDetails()" class="flex items-center gap-3 font-bold hover:text-cyan-400 transition text-lg"><i class="fas fa-long-arrow-alt-right text-2xl"></i> العودة</button>
            <div class="text-[10px] font-[Orbitron] tracking-[5px] opacity-40">SECURE_STREAM_MOD</div>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn upload shadow-lg" id="upload-btn"><i class="fas fa-plus text-white"></i></div>
        <div class="nav-btn" onclick="openAdmin()"><i class="fas fa-fingerprint text-cyan-400"></i></div>
        <div class="nav-btn" onclick="toggleChat()"><i class="fas fa-satellite-dish text-pink-500"></i></div>
    </nav>

    <div id="admin-ui" class="overlay">
        <div class="flex justify-between items-center mb-10 sticky top-0 bg-[#000] py-4"><h1 class="font-[Orbitron] text-2xl">CORE_CONTROL</h1><i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="closeAdmin()"></i></div>
        <div id="admin-list" class="space-y-4"></div>
    </div>

    <div id="chat-ui" class="overlay flex-col">
        <div class="flex justify-between items-center mb-8"><h1 class="font-[Orbitron] text-2xl">AETHER_LOGS</h1><i class="fas fa-times cursor-pointer text-3xl opacity-20" onclick="toggleChat()"></i></div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-4 p-6 bg-white/5 rounded-[30px] mb-4 border border-white/5"></div>
        <div class="flex gap-3"><input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-5 outline-none border border-white/10" placeholder="رسالة..."><button onclick="sendMsg()" class="bg-cyan-500 px-8 rounded-2xl text-black font-black"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <footer>
        <div class="font-[Orbitron] font-black tracking-widest text-[#00f3ff]">AETHER_X</div>
        <div id="footer-date" class="text-xs opacity-50 font-bold mt-3"></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://fokx-c135a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        
        const ADS = {
            like: "https://www.effectivegatecpm.com/ywn2a0wz7?key=7433561eca4a0920fafc9d653809bab2",
            share: "https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90",
            comment: "https://www.effectivegatecpm.com/t3rvmzpu?key=26330eef1cb397212db567d1385dc0b9",
            siteName: "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        };

        function fireAd(link) { window.open(link, '_blank'); }
        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        document.getElementById('footer-date').innerText = "تمت المزامنة: " + new Date().toLocaleDateString('ar-EG');

        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const data = snap.val();
            if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetails(id, v);
                // استخدام controlsList لمنع التحميل
                card.innerHTML = `<div class="video-container"><video loop playsinline muted src="${v.url}" controlsList="nodownload" disablePictureInPicture></video></div><div class="p-6 flex justify-between items-center"><div><span class="text-xs font-black text-cyan-500 font-[Orbitron]">ID_${id.substring(1,6)}</span><p class="text-[10px] opacity-50 truncate w-48 mt-1">${v.desc || ""}</p></div><div class="bg-white/5 px-4 py-2 rounded-xl font-[Orbitron]"><i class="fas fa-bolt text-pink-500"></i> ${v.likes || 0}</div></div>`;
                feed.appendChild(card);
            });
            observeFeed();
        });

        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            render.innerHTML = `
                <div class="details-content max-w-[900px] mx-auto p-4 pb-20">
                    <div class="video-container rounded-[40px] border border-white/10 shadow-2xl">
                        <video id="main-player" controls autoplay src="${v.url}" controlsList="nodownload" disablePictureInPicture oncontextmenu="return false;"></video>
                    </div>
                    <div class="action-bar shadow-xl">
                        <div class="btn-action" onclick="likeVid(event, '${id}')"><i class="fas fa-atom"></i><span class="font-[Orbitron]">${v.likes || 0} PULSE</span></div>
                        <div class="btn-action" onclick="shareVid(event)"><i class="fas fa-project-diagram"></i><span>توزيع</span></div>
                        <div class="btn-action"><i class="fas fa-fingerprint"></i><span class="text-[10px] opacity-60">SECURED</span></div>
                    </div>
                    <div class="mt-12 px-4">
                        <h2 class="text-2xl font-black text-white mb-5 flex items-center gap-3"><span class="w-1.5 h-8 bg-pink-500 rounded-full"></span> تفاصيل المقطع</h2>
                        <div class="bg-white/5 p-7 rounded-3xl border border-white/5 text-sm opacity-80">${v.desc || "مقطع محمي."}</div>
                        <div class="bg-white/2 rounded-[45px] p-8 border border-white/5 my-10">
                            <h3 class="font-black mb-8 flex items-center gap-3 font-[Orbitron] cursor-pointer text-cyan-400" onclick="fireAd(ADS.comment)"><i class="fas fa-satellite text-lg"></i> التعليقات</h3>
                            <div id="video-comments-${id}" class="space-y-4 max-h-[300px] overflow-y-auto mb-8 pr-4"></div>
                            <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/10">
                                <input id="comm-input-${id}" class="bg-transparent flex-1 p-3 outline-none text-sm" placeholder="أضف تعليقك..." onclick="fireAd(ADS.comment)">
                                <button onclick="addComment('${id}')" class="bg-cyan-500 w-14 h-14 rounded-2xl text-black font-black"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            loadComments(id);
        }

        function closeDetails() { document.getElementById('video-details-ui').style.display = 'none'; document.body.style.overflow = 'auto'; const p = document.getElementById('main-player'); if(p) p.pause(); }

        function likeVid(e, id) { e.stopPropagation(); fireAd(ADS.like); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid(e) { e.stopPropagation(); fireAd(ADS.share); if(navigator.share) navigator.share({url: window.location.href}); }
        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input || !input.value.trim()) return;
            fireAd(ADS.comment);
            db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value });
            input.value = '';
        }

        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`);
                if(!box) return; box.innerHTML = '';
                snap.forEach(c => { const d = c.val(); box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-l-4 border-cyan-500 mb-2"><div class="text-[8px] font-[Orbitron] text-cyan-400 font-bold mb-1">${d.u}</div><div class="text-sm opacity-90">${d.t}</div></div>`; });
            });
        }

        function openAdmin() { if(prompt("ACCESS:") === "1234") { renderAdmin(); document.getElementById('admin-ui').style.display = 'block'; } }
        function renderAdmin() {
            db.ref('videos').once('value', s => {
                const b = document.getElementById('admin-list'); b.innerHTML = '';
                s.forEach(child => {
                    const v = child.val(); const id = child.key;
                    b.innerHTML += `<div class="flex items-center gap-4 bg-white/5 p-4 rounded-xl mb-2"><video class="w-16 h-16 rounded object-cover" src="${v.url}"></video><div class="flex-1 text-[10px] opacity-50">${id}</div><button onclick="deleteVid('${id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
                });
            });
        }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function deleteVid(id) { if(confirm("حذف؟")) db.ref(`videos/${id}`).remove().then(renderAdmin); }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }
        function sendMsg() { const i = document.getElementById('msg-input'); if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; } }
        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => { const d = m.val(); b.innerHTML += `<div class="bg-white/2 p-4 rounded-xl border-r-2 border-pink-500 mb-2"><div class="text-[8px] font-[Orbitron] text-pink-400 mb-1">${d.u}</div><div class="text-sm">${d.t}</div></div>`; });
        });

        const widget = cloudinary.createUploadWidget({
            cloudName: "dk5kas1gc", uploadPreset: "go_kck", sources: ['local'], resourceType: "video",
        }, (err, res) => {
            if(!err && res.event === "success") {
                const d = prompt("وصف المقطع:");
                db.ref('videos').push({ url: res.info.secure_url, likes: 0, desc: d || "" });
            }
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { v.play().catch(()=>{}); } else { v.pause(); }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
