name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - run: npm install -g @capacitor/cli @capacitor/core @capacitor/android
      
      - run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          
      - run: |
          cat > package.json << 'EOF'
          {"name":"legacy","version":"1.0.0","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}
          EOF
          
      - run: |
          cat > capacitor.config.json << 'EOF'
          {"appId":"com.legacy.app","appName":"LEGACY","webDir":"www"}
          EOF
          
      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android
      
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - uses: actions/upload-artifact@v4
        with:
          name: LEGACY-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
