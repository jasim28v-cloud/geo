# ═══════════════════════════════════════════════════════════════
# 🚀  X PLATFORM - GitHub Actions Workflow
#     Auto Deploy to GitHub Pages
# ═══════════════════════════════════════════════════════════════

name: 🚀 Deploy X Platform to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # تشغيل يدوي من Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════
  # 📦  BUILD JOB - بناء الموقع
  # ═══════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📂 Setup Pages
        uses: actions/configure-pages@v5

      - name: 🧹 Clean & Prepare
        run: |
          echo "🧹 تنظيف الملفات القديمة..."
          mkdir -p _site
          rm -rf _site/*

      - name: 📄 Copy Files to _site
        run: |
          echo "📄 نسخ الملفات إلى _site..."
          cp -r gtheb/* _site/ 2>/dev/null || echo "⚠️ مجلد gtheb غير موجود"
          cp -r ./*.html _site/ 2>/dev/null || echo "⚠️ لا توجد ملفات HTML في الجذر"
          cp -r ./*.js _site/ 2>/dev/null || echo "⚠️ لا توجد ملفات JS في الجذر"
          cp -r ./*.css _site/ 2>/dev/null || echo "⚠️ لا توجد ملفات CSS في الجذر"

      - name: 📋 List Files
        run: |
          echo "📋 الملفات الموجودة في _site:"
          ls -la _site/

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  # ═══════════════════════════════════════════════════════════
  # 🚀  DEPLOY JOB - نشر الموقع
  # ═══════════════════════════════════════════════════════════
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ═══════════════════════════════════════════════════════════
  # 📊  STATUS JOB - عرض حالة النشر
  # ═══════════════════════════════════════════════════════════
  status:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: 📊 Deployment Status
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                                                              ║"
          echo "║  🚀  X PLATFORM DEPLOYMENT COMPLETE  🚀                      ║"
          echo "║                                                              ║"
          echo "║  ✅  تم نشر الموقع بنجاح!                                    ║"
          echo "║  🌐  الرابط: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/  ║"
          echo "║                                                              ║"
          echo "║  🔥  Firebase: dhsy-73aef                                   ║"
          echo "║  ☁️   Cloudinary: tqhozkme / se33_g                         ║"
          echo "║  👑  Admin: jasim28v@gmail.com                              ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
